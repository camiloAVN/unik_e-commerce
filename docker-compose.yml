version: '3.8'

services:
  postgres-db:
    image: postgres:17.6-alpine
    container_name: UNIK_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
     - 5432:5432 